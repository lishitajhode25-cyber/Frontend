<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Face Authentication</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-animation"></div>

<div class="login-card">
    <h1>Face Authentication</h1>
    <p class="subtitle">Secure Aadhaar Verification Portal</p>

    <form id="loginForm">
        <div class="input-group">
            <input type="text" placeholder="Enter Aadhaar Number" required>
        </div>
        <div class="input-group">
            <input type="password" placeholder="Enter Password" required>
        </div>
        <button type="submit" class="primary-btn">Login</button>
    </form>

    <p class="footer-text">Government Grade Secure Access</p>
</div>

<script src="js/login.js"></script>
</body>
</html>
